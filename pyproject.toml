[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "email-agent-env"
version = "0.1.0"
description = "Email Agent Environment for OpenEnv"
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic"
]

[tool.setuptools.packages.find]
include = ["env*"]
