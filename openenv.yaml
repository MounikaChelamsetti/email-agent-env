name: email-agent-env
description: Elite email assistant simulation

version: 0.1.0

environment:
  entry_point: main:app

tasks:
  - id: easy
    description: Prioritize urgent emails
    grader:
      type: python
      entry_point: env.grader:grade_easy

  - id: medium
    description: Classify spam emails
    grader:
      type: python
      entry_point: env.grader:grade_medium

  - id: hard
    description: Handle mixed inbox
    grader:
      type: python
      entry_point: env.grader:grade_hard
